{% extends "main_app/base.html" %}

{% block content %}
<div class="overview-header">
    <h1>⚠️ Confirm Destruction Sequence</h1>
    <p>Are you sure you want to permanently erase file record row <strong>{{ doc.title }}</strong>?</p>
</div>

<div class="form-container">
    <form method="POST">
        {% csrf_token %}
        <p>This structural action cannot be undone inside your SQLite logs.</p>
        <div class="form-actions">
            <button type="submit" class="btn-primary" style="background-color: #dc2626;">Yes, Delete Record</button>
            <a href="{% url 'documents:dashboard' %}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
