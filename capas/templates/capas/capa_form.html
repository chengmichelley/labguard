{% extends 'main_app/base.html' %}

{% block content %}
<div class='overview-header'>
  <h1>📝 CAPA Management Form</h1>
  <p>Open or modify a Corrective and Preventive Action plan record.</p>
</div>

<div class='form-container'>
  <form method="POST">
    {% csrf_token %}

    {% for field in form %}
    <div class='form-group'>
      <label>{{ field.label }}</label>
      {{ field }}
      {% if field.help_text %}
        <small class='help-text'>{{ field.help_text }}</small>
      {% endif %}
    </div>
    {% endfor %}

    <div class='form-actions'>
      <button type='submit' class='btn-primary'>Save Action Plan</button>
      <a href='{% url "capas:dashboard" %}' class='btn-secondary'>Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
