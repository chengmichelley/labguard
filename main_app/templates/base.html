        <link rel="stylesheet" href="{% static 'css/base.css' %}" />

        {% block head %} {% endblock %}
    </head>
    <body>

            <nav class = "navbar">
                <ul class = "nav-links">
                    <li><a href="{% url 'main_app:about' %}" class="nav-item">About</a></li>
                    <li><a href="{% url 'main_app:overview' %}" class="nav-item">Dashboard</a></li>

        <main>{% block content%} {% endblock %}</main>
